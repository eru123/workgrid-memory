name: Documentation issue
description: Report missing, confusing, or incorrect documentation.
title: "[Docs]: "
labels: ["documentation", "needs-triage"]
body:
  - type: textarea
    id: location
    attributes:
      label: Document or section
      description: Which file or section needs improvement?
      placeholder: "README.md, DESIGN.md, IMPLEMENTATION.md, SECURITY.md..."
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: Issue
      description: What is missing, unclear, outdated, or wrong?
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: Optional suggested wording or structure.
    validations:
      required: false
