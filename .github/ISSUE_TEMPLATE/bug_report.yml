name: Bug report
description: Report a reproducible bug in WorkGrid Memory.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Remove secrets, private profile data, private photos, and customer code before submitting.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps.
      placeholder: |
        1. Open WorkGrid Memory
        2. Add workspace...
        3. Run...
        4. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: WorkGrid Memory version or commit
      placeholder: "v0.0.0 or commit hash"
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: workspace
    attributes:
      label: Workspace details
      description: Language/framework, approximate file count, and project type.
      placeholder: "Example: Laravel + React, around 2,000 files"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste safe logs only. Remove secrets and private data.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed secrets, private profile data, private photos, and private customer data from this report.
          required: true
